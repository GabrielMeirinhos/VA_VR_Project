<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR CRUD Project</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <link rel="stylesheet" href="../styles/style.css">
  </head>
  <body>
    <a-scene>
      <!-- Assets -->
      <a-assets>
        <img id="groundTexture" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
        <a-mixin id="button" geometry="primitive: box; width: 0.8; height: 0.3; depth: 0.1"
                 material="color: #4CC3D9"
                 text="align: center; color: white; width: 3"></a-mixin>
        <a-mixin id="item" geometry="primitive: box" material="color: red"></a-mixin>
      </a-assets>

      <!-- Camera + Gaze Cursor -->
      <a-entity id="camera-rig" position="0 1.6 0">
        <a-camera>
          <!-- Cursor central (Gaze) -->
          <!-- Fuse=true enables automatic click after timeout -->
          <a-cursor fuse="true" fuse-timeout="300"
                    material="color: white; shader: flat; opacity: 0.8"
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                    animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                    animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 300; from: 1 1 1; to: 0.1 0.1 0.1"
                    animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1">
                    <!-- Hand Icon -->
                    <a-text value="✋" align="center" position="0 -0.05 0" width="2" color="white"></a-text>
          </a-cursor>
        </a-camera>
      </a-entity>

      <!-- Painel de Controle (Botões 3D) -->
      <a-entity id="control-panel" position="0 1 -2" rotation="-20 0 0">
        <!-- CREATE Button -->
        <a-entity class="crud-button" data-action="create" mixin="button" position="-1 0 0" material="color: green">
          <a-text value="CRIAR" align="center" position="0 0 0.06" color="white" width="4"></a-text>
        </a-entity>

        <!-- UPDATE Button -->
        <a-entity class="crud-button" data-action="update" mixin="button" position="0 0 0" material="color: orange">
          <a-text value="COR" align="center" position="0 0 0.06" color="white" width="4"></a-text> <!-- Renomeado para COR -->
        </a-entity>

        <!-- MOVE Button -->
        <a-entity class="crud-button" data-action="move" mixin="button" position="0 0.5 0" material="color: purple">
          <a-text value="MOVER" align="center" position="0 0 0.06" color="white" width="4"></a-text>
        </a-entity>

        <!-- DELETE Button -->
        <a-entity class="crud-button" data-action="delete" mixin="button" position="1 0 0" material="color: red">
          <a-text value="DELETAR" align="center" position="0 0 0.06" color="white" width="4"></a-text>
        </a-entity>

        <!-- LIST Button -->
        <a-entity class="crud-button" data-action="list" mixin="button" position="0 -0.5 0" material="color: blue">
          <a-text value="LISTAR" align="center" position="0 0 0.06" color="white" width="4"></a-text>
        </a-entity>
      </a-entity>

      <!-- Container para os objetos do CRUD -->
      <a-entity id="items-container" position="0 0 -4"></a-entity>

      <!-- Ambiente -->
      <a-plane src="#groundTexture" rotation="-90 0 0" width="30" height="30" repeat="10 10"></a-plane>
      <a-sky color="#ECECEC"></a-sky>

      <!-- Iluminação -->
      <a-light type="ambient" color="#445451"></a-light>
      <a-light type="point" intensity="2" position="2 4 4"></a-light>
    </a-scene>

    <script src="../scripts/script.js"></script>
  </body>
</html>
